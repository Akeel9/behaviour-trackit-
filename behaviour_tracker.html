<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behaviour Tracker</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#000;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.container{
    width:95%;
    max-width:1200px;
    background:white;
    border-radius:20px;
    padding:20px;
    display:flex;
    gap:20px;
}
.left{
    flex:1;
    background:#1fb34a;
    border-radius:20px;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}
.card{
    background:white;
    color:black;
    border-radius:15px;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}
.right{
    width:380px;
    background:#2b79b8;
    border-radius:20px;
    padding:20px;
}
.student{
    background:white;
    color:black;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
    padding:10px 15px;
    border-radius:10px;
    font-size:26px;
    cursor:pointer;
}
.score{
    font-weight:bold;
}
.controls{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    justify-content:center;
}
.light{
    width:60px;
    height:60px;
    border-radius:50%;
    cursor:pointer;
    border:4px solid white;
}
.red{background:red;}
.yellow{background:gold;}
.green{background:limegreen;}

.selected{
    outline:6px solid cyan;
}
</style>
</head>
<body>

<div class="container">
    <div class="left">
        <div class="card">Joining In</div>
        <div class="card">Quiet</div>
        <div class="card">Working Hard</div>
        <div class="card">Helpful</div>
        <div class="card">Great Effort</div>
        <div class="card">Behaviour</div>
        <div class="card">Ready</div>
        <div class="card">Tidying Up</div>
        <div class="card">Star Award</div>
    </div>

    <div class="right">
        <div class="controls">
            <div class="light red" onclick="setColour('red')"></div>
            <div class="light yellow" onclick="setColour('gold')"></div>
            <div class="light green" onclick="setColour('limegreen')"></div>
        </div>

        <div id="students"></div>
    </div>
</div>

<script>
const names = [
"Aanya","Agamdeep","Akeel","Ana-Maryam","Arjun","Artjom","Avnoor",
"Brandon","Brooke","Connor","Dana","George","Gurmandeep","Katy",
"Kylo","Logan","Nithesh","Richard","Louisa","Norseen","Sophia",
"Maneet","Paula","Michael","Reive"
];

let currentColour = "white";

function setColour(col){
    currentColour = col;
}

const container = document.getElementById("students");

names.forEach(name=>{
    const div = document.createElement("div");
    div.className = "student";
    div.innerHTML = `<span>${name}</span><span class="score">0</span>`;

    div.addEventListener("click", ()=>{
        div.style.background = currentColour;
    });

    container.appendChild(div);
});
</script>

</body>
</html>
